<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="library">
        <div class="book-row">
            <div class="number">1</div>
            <div class="info">
                <h2>Nikola Tesla</h2>
                <div class="progress-container" onclick="seek(event, 'tesla')">
                    <div class="progress-bar" id="bar-tesla"></div>
                </div>
            </div>
            <button onclick="toggleAudio('tesla')" class="play-btn" id="btn-tesla">▶</button>
            <audio id="audio-tesla" src="nikola-tesla.mp3"></audio>
        </div>

        <div class="book-row">
            <div class="number">2</div>
            <div class="info">
                <h2>Steve Jobs</h2>
                <div class="progress-container" onclick="seek(event, 'jobs')">
                    <div class="progress-bar" id="bar-jobs"></div>
                </div>
            </div>
            <button onclick="toggleAudio('jobs')" class="play-btn" id="btn-jobs">▶</button>
            <audio id="audio-jobs" src="steve-jobs.mp3"></audio>
        </div>

        <div class="book-row">
            <div class="number">3</div>
            <div class="info">
                <h2>Marie Curie</h2>
                <div class="progress-container" onclick="seek(event, 'curie')">
                    <div class="progress-bar" id="bar-curie"></div>
                </div>
            </div>
            <button onclick="toggleAudio('curie')" class="play-btn" id="btn-curie">▶</button>
            <audio id="audio-curie" src="marie-curie.mp3"></audio>
        </div>

        <div class="book-row">
            <div class="number">4</div>
            <div class="info">
                <h2>Sam Altman</h2>
                <div class="progress-container" onclick="seek(event, 'altman')">
                    <div class="progress-bar" id="bar-altman"></div>
                </div>
            </div>
            <button onclick="toggleAudio('altman')" class="play-btn" id="btn-altman">▶</button>
            <audio id="audio-altman" src="sam-altman.mp3"></audio>
        </div>

        <div class="book-row">
            <div class="number">5</div>
            <div class="info">
                <h2>Mark Zuckerberg</h2>
                <div class="progress-container" onclick="seek(event, 'zuckerberg')">
                    <div class="progress-bar" id="bar-zuckerberg"></div>
                </div>
            </div>
            <button onclick="toggleAudio('zuckerberg')" class="play-btn" id="btn-zuckerberg">▶</button>
            <audio id="audio-zuckerberg" src="mark-zuckerberg.mp3"></audio>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
